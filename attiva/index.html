<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurgTV — Attivazione</title>
    <meta name="robots" content="noindex,nofollow">
    <!--
      🔧 v1.1.12 — /attiva/ has been replaced by /register.html (which also collects
      email + password so the customer can later log in and manage devices).
      This page is kept only as a redirect so old QR codes / printed materials /
      bookmarks pointing to /attiva keep working. The QR generated by the TV app
      now points directly to /register.html?code=...
    -->
    <link rel="canonical" href="/register.html">
    <script>
        (function () {
            var qs = window.location.search || '';
            // Preserve any query params (?code=TV-XXXX, ?cancelled=true, ...)
            var target = '/register.html' + qs;
            window.location.replace(target);
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0;url=/register.html">
    </noscript>
    <style>
        body{margin:0;background:#0a0a0b;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
        a{color:#d85aa3}
    </style>
</head>
<body>
    <div>
        <p>Reindirizzamento in corso…</p>
        <p>Se non vieni reindirizzato automaticamente, <a href="/register.html">clicca qui</a>.</p>
    </div>
</body>
</html>
