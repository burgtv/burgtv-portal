    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a0b;--bg2:#111113;--text:#fff;--muted:#9ca3af;--accent:#B94A8E;--accent-light:#d85aa3;--accent-dark:#7B4397;--success:#10b981;--error:#ef4444;--border:rgba(255,255,255,0.10);--card:rgba(255,255,255,0.03)}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 50%,rgba(185,74,142,0.08),transparent 50%),radial-gradient(circle at 80% 80%,rgba(123,67,151,0.08),transparent 50%);pointer-events:none}
        .lang-switch{position:fixed;top:0.75rem;right:0.75rem;display:flex;gap:0.25rem;z-index:1000;background:var(--card);backdrop-filter:blur(10px);padding:0.25rem;border-radius:8px;border:1px solid var(--border)}
        .lang-btn{padding:0.3rem 0.6rem;background:transparent;color:var(--muted);border:none;border-radius:5px;cursor:pointer;font-size:0.72rem;font-weight:600;transition:all 0.2s}
        .lang-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
        .lang-btn.active{background:var(--accent);color:#fff}
        .container{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;backdrop-filter:blur(20px);box-shadow:0 16px 40px -12px rgba(0,0,0,0.5);position:relative;z-index:1}
        .logo-section{text-align:center;margin-bottom:24px}
        .logo-img{height:48px;width:auto;margin-bottom:12px;filter:drop-shadow(0 6px 20px rgba(185,74,142,0.35))}
        .logo-section h1{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-0.02em}
        .logo-section p{color:var(--muted);font-size:13px}
        .form-group{position:relative;margin-bottom:14px}
        .form-input{width:100%;padding:12px 14px;padding-right:42px;font-size:14px;font-family:inherit;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:all 0.2s}
        .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(185,74,142,0.12)}
        .form-input:focus+.form-label,.form-input:not(:placeholder-shown)+.form-label{top:-7px;left:10px;font-size:11px;background:var(--bg2);padding:0 6px;color:var(--accent)}
        .form-label{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;transition:all 0.2s}
        .password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center}
        .password-toggle:hover{color:var(--text)}
        .password-toggle svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
        .turnstile-wrapper{display:flex;justify-content:center;margin-bottom:14px}
        .btn-login{width:100%;padding:12px 16px;font-size:14px;font-family:inherit;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border:none;border-radius:10px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 18px rgba(185,74,142,0.28)}
        .btn-login:hover{box-shadow:0 8px 22px rgba(185,74,142,0.38)}
        .btn-login:disabled{opacity:0.7;cursor:not-allowed}
        .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .error-message{background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;align-items:center;gap:8px}
        .error-message.show{display:flex}
        .error-message svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}
        .form-links{text-align:center;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
        .forgot-link{display:inline-flex;align-items:center;gap:5px;color:var(--accent-light);text-decoration:none;font-size:13px;margin-bottom:8px}
        .forgot-link:hover{color:var(--accent-light)}
        .register-link{display:block;color:var(--muted);font-size:13px}
        .register-link a{color:var(--accent-light);text-decoration:none;font-weight:500}
        .register-link a:hover{color:var(--accent-light)}
        .form-footer{text-align:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
        .form-footer a{color:var(--muted);text-decoration:none}
        .form-footer a:hover{color:var(--accent)}
        .form-footer .dot{opacity:0.5}
        /* Tablet+ */
        @media(min-width:769px){
            .container{max-width:420px;padding:32px 28px}
            .logo-img{height:56px;margin-bottom:14px}
            .logo-section h1{font-size:24px}

        .burgtv-back-btn{position:fixed;top:1rem;left:1rem;display:flex;align-items:center;justify-content:center;width:36px;height:36px;padding:0;background:rgba(20,20,30,0.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;text-decoration:none;z-index:1000;transition:all .2s}
        .burgtv-back-btn:hover{background:rgba(185,74,142,.15);border-color:#B94A8E;transform:translateX(-2px)}
        .burgtv-back-btn svg{width:16px;height:16px}
        @media(max-width:768px){.burgtv-back-btn{display:none!important}}
</style>

<body>

    <div class="lang-switch">
        <button class="lang-btn active" data-lang="it">IT</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="pt">PT</button>
        <button class="lang-btn" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="nl">NL</button>
        <button class="lang-btn" data-lang="pl">PL</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="ar">AR</button>
    </div>
    
    <div class="container">
        <div class="logo-section">
            <img src="logo.png" alt="BurgTV" class="logo-img">
            <h1 data-i18n="title">Accedi</h1>
            <p data-i18n="subtitle">Inserisci le tue credenziali</p>
        </div>
        
        <div class="error-message" id="errorMessage">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="errorText"></span>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" class="form-input" placeholder=" " required autocomplete="email">
                <label for="email" class="form-label" data-i18n="email">Email</label>
            </div>
            
            <div class="form-group">
                <input type="password" id="password" class="form-input" placeholder=" " required autocomplete="current-password">
                <label for="password" class="form-label" data-i18n="password">Password</label>
                <button type="button" class="password-toggle" aria-label="Mostra o nascondi password" id="togglePwd">
                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            
            <div class="turnstile-wrapper">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAACI9QL47xbPexYyL" data-callback="onTurnstileSuccess" data-error-callback="onTurnstileError" data-expired-callback="onTurnstileExpired" data-retry="auto" data-theme="dark"></div>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText" data-i18n="loginBtn">Accedi</span>
            </button>
        </form>
        
        <div class="form-links">
            <a href="forgot-password.html" class="forgot-link" data-i18n="forgot">Password dimenticata?</a>
            <p class="register-link"><span data-i18n="noAccount">Non hai un account?</span> <a href="register.html" data-i18n="registerLink">Registrati</a></p>
        </div>
        
    </div>
    
    <script>
        const SUPABASE_URL = 'https://api.burgtv.com';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnc3BtcWZkdWFiZm1mc294cW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ1NTMyMDEsImV4cCI6MjA2MDEyOTIwMX0.1Xj4sa51Wi8U1Ebm4B3DE5JxCR3eTx2TQUxfV0TaA-I';
        
        const T = {
            it:{back:"Indietro",title:"Accedi",subtitle:"Inserisci le tue credenziali",email:"Email",password:"Password",loginBtn:"Accedi",forgot:"Password dimenticata?",noAccount:"Non hai un account?",registerLink:"Registrati",privacy:"Privacy",terms:"Termini",errInvalid:"Email o password non validi",errGeneric:"Errore. Riprova."},
            en:{back:"Back",title:"Sign In",subtitle:"Enter your credentials",email:"Email",password:"Password",loginBtn:"Sign In",forgot:"Forgot password?",noAccount:"Don't have an account?",registerLink:"Sign up",privacy:"Privacy",terms:"Terms",errInvalid:"Invalid email or password",errGeneric:"Error. Try again."},
            de:{back:"Zurück",title:"Anmelden",subtitle:"Geben Sie Ihre Daten ein",email:"E-Mail",password:"Passwort",loginBtn:"Anmelden",forgot:"Passwort vergessen?",noAccount:"Kein Konto?",registerLink:"Registrieren",privacy:"Datenschutz",terms:"AGB",errInvalid:"Ungültige E-Mail oder Passwort",errGeneric:"Fehler. Nochmal versuchen."},
            es:{back:"Volver",title:"Iniciar sesión",subtitle:"Ingresa tus credenciales",email:"Correo",password:"Contraseña",loginBtn:"Entrar",forgot:"¿Olvidaste tu contraseña?",noAccount:"¿No tienes cuenta?",registerLink:"Regístrate",privacy:"Privacidad",terms:"Términos",errInvalid:"Correo o contraseña inválidos",errGeneric:"Error. Inténtalo de nuevo."},
            fr:{back:"Retour",title:"Connexion",subtitle:"Entrez vos identifiants",email:"Email",password:"Mot de passe",loginBtn:"Se connecter",forgot:"Mot de passe oublié?",noAccount:"Pas de compte?",registerLink:"S'inscrire",privacy:"Confidentialité",terms:"Conditions",errInvalid:"Email ou mot de passe invalide",errGeneric:"Erreur. Réessayez."},
            pt:{back:"Voltar",title:"Iniciar sessão",subtitle:"Introduza as suas credenciais",email:"Email",password:"Palavra-passe",loginBtn:"Entrar",forgot:"Esqueceu-se da palavra-passe?",noAccount:"Não tem conta?",registerLink:"Registar",privacy:"Privacidade",terms:"Termos",errInvalid:"Email ou palavra-passe inválidos",errGeneric:"Erro. Tente novamente."},
            tr:{back:"Geri",title:"Giriş Yap",subtitle:"Bilgilerinizi girin",email:"E-posta",password:"Şifre",loginBtn:"Giriş Yap",forgot:"Şifrenizi mi unuttunuz?",noAccount:"Hesabınız yok mu?",registerLink:"Kayıt ol",privacy:"Gizlilik",terms:"Şartlar",errInvalid:"E-posta veya şifre geçersiz",errGeneric:"Hata. Tekrar deneyin."},
            nl:{back:"Terug",title:"Inloggen",subtitle:"Vul uw gegevens in",email:"E-mail",password:"Wachtwoord",loginBtn:"Inloggen",forgot:"Wachtwoord vergeten?",noAccount:"Nog geen account?",registerLink:"Registreren",privacy:"Privacy",terms:"Voorwaarden",errInvalid:"Ongeldig e-mailadres of wachtwoord",errGeneric:"Fout. Probeer opnieuw."},
            pl:{back:"Wstecz",title:"Zaloguj się",subtitle:"Wpisz swoje dane",email:"E-mail",password:"Hasło",loginBtn:"Zaloguj się",forgot:"Nie pamiętasz hasła?",noAccount:"Nie masz konta?",registerLink:"Zarejestruj się",privacy:"Prywatność",terms:"Warunki",errInvalid:"Nieprawidłowy e-mail lub hasło",errGeneric:"Błąd. Spróbuj ponownie."},
            ru:{back:"Назад",title:"Войти",subtitle:"Введите ваши данные",email:"Email",password:"Пароль",loginBtn:"Войти",forgot:"Забыли пароль?",noAccount:"Нет аккаунта?",registerLink:"Зарегистрироваться",privacy:"Конфиденциальность",terms:"Условия",errInvalid:"Неверный email или пароль",errGeneric:"Ошибка. Попробуйте снова."},
            ar:{back:"رجوع",title:"تسجيل الدخول",subtitle:"أدخل بيانات اعتمادك",email:"البريد الإلكتروني",password:"كلمة المرور",loginBtn:"تسجيل الدخول",forgot:"نسيت كلمة المرور؟",noAccount:"ليس لديك حساب؟",registerLink:"التسجيل",privacy:"الخصوصية",terms:"الشروط",errInvalid:"البريد أو كلمة المرور غير صحيحة",errGeneric:"خطأ. حاول مرة أخرى."}
        };
        
        function _initLang(){
            const RE=/^(it|en|de|es|fr|pt|tr|nl|pl|ru|ar)$/;
            const m = document.cookie.match(/burgtv_lang=([^;]+)/);
            if (m && RE.test(m[1])) return m[1];
            const sv = localStorage.getItem('lang') || localStorage.getItem('preferredLang'); if(sv && RE.test(sv)) return sv;
            const nv = ((navigator.languages && navigator.languages[0]) || navigator.language || '').slice(0,2).toLowerCase(); if(RE.test(nv)) return nv;
            return 'en';
        }
        let lang = _initLang();
        let turnstileToken = null;

        function setLang(l) {
            if (!T[l]) l = 'it';
            lang = l;
            localStorage.setItem('lang', l);
            localStorage.setItem('preferredLang', l);
            const dom = location.hostname.endsWith('.burgtv.com') || location.hostname === 'burgtv.com' ? '; domain=.burgtv.com' : '';
            document.cookie = 'burgtv_lang=' + l + '; max-age=31536000; path=/' + dom + '; SameSite=Lax';
            document.documentElement.dir = (l === 'ar' ? 'rtl' : 'ltr');
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (T[l][key]) el.textContent = T[l][key];
            });
        }
        
        function onTurnstileSuccess(token) { turnstileToken = token; }
        function onTurnstileError() { turnstileToken = null; try{ turnstile.reset(); }catch(_){} }
        function onTurnstileExpired() { turnstileToken = null; }
        
        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMessage').classList.add('show');
        }
        
        function hideError() { document.getElementById('errorMessage').classList.remove('show'); }
        
        function setLoading(loading) {
            const btn = document.getElementById('loginBtn');
            const text = document.getElementById('btnText');
            btn.disabled = loading;
            text.innerHTML = loading ? '<span class="spinner"></span>' : T[lang].loginBtn;
        }
        
        document.getElementById('togglePwd').addEventListener('click', function() {
            const input = document.getElementById('password');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            this.innerHTML = isPassword 
                ? '<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        });
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLang(btn.dataset.lang));
        });
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError(T[lang].errInvalid);
                return;
            }
            
            setLoading(true);
            
            try {
                const response = await fetch(`${SUPABASE_URL}/functions/v1/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    },
                    body: JSON.stringify({ email, password, turnstile_token: turnstileToken, source: 'web' })
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error || 'Login failed');

                // Salva sessione
                localStorage.setItem('session_token', data.session_token);
                localStorage.setItem('user_email', email);
                localStorage.setItem('user_id', data.user.id);

                // Salva info licenza se presente
                if (data.license) {
                    localStorage.setItem('license_type', data.license.type);
                    localStorage.setItem('license_status', data.license.status);
                }

                window.location.href = 'account.html';
            } catch (error) {
                console.error('Login error:', error);
                showError(T[lang].errInvalid);
                setLoading(false);
            }
        });
        
        // Initialize
        setLang(lang);
    </script>
</body>
