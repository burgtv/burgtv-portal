    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a0b;--bg2:#111113;--text:#fff;--muted:#9ca3af;--accent:#B94A8E;--accent-light:#d85aa3;--accent-dark:#7B4397;--success:#10b981;--error:#ef4444;--border:rgba(255,255,255,0.10);--card:rgba(255,255,255,0.03)}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 50%,rgba(185,74,142,0.08),transparent 50%),radial-gradient(circle at 80% 80%,rgba(123,67,151,0.08),transparent 50%);pointer-events:none}
        .container{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;backdrop-filter:blur(20px);position:relative;z-index:1;box-shadow:0 16px 40px -12px rgba(0,0,0,0.5)}
        .logo-section{text-align:center;margin-bottom:20px}
        .logo-img{height:48px;width:auto;margin-bottom:10px;filter:drop-shadow(0 6px 20px rgba(185,74,142,0.35))}
        .logo-section h1{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-0.02em}
        .logo-section p{color:var(--muted);font-size:13px;line-height:1.5}
        .step{display:none}.step.active{display:block}
        .form-group{position:relative;margin-bottom:14px}
        .form-input{width:100%;padding:12px 14px;font-size:14px;font-family:inherit;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:all 0.2s}
        .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(185,74,142,0.12)}
        .form-input:focus+.form-label,.form-input:not(:placeholder-shown)+.form-label{top:-7px;left:10px;font-size:11px;background:var(--bg2);padding:0 6px;color:var(--accent)}
        .form-label{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;transition:all 0.2s}
        .otp-input{text-align:center;font-size:22px;letter-spacing:6px;font-weight:700}
        .btn{width:100%;padding:12px 16px;font-size:14px;font-weight:600;font-family:inherit;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;box-shadow:0 6px 18px rgba(185,74,142,0.28)}
        .btn:hover{box-shadow:0 8px 22px rgba(185,74,142,0.38)}
        .btn:disabled{opacity:0.7;cursor:not-allowed}
        .turnstile-wrapper{display:flex;justify-content:center;margin-bottom:14px}
        .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .message{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;align-items:center;gap:8px}
        .message.error{background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.3);color:#fca5a5}
        .message.success{background:rgba(16,185,129,0.10);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7}
        .message.show{display:flex}
        .back-login{text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
        .back-login a{color:var(--accent);text-decoration:none;font-size:13px}
        .back-login a:hover{color:var(--accent-light)}
        .steps-indicator{display:flex;justify-content:center;gap:6px;margin-bottom:18px}
        .step-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
        .step-dot.active{background:var(--accent)}
        .step-dot.done{background:var(--success)}
        .resend-link{text-align:center;margin-top:12px;font-size:12px;color:var(--muted)}
        .resend-link a{color:var(--accent);cursor:pointer;text-decoration:underline}
        .lang-switch{position:fixed;top:0.75rem;right:0.75rem;display:flex;gap:0.25rem;z-index:1000;background:var(--card);backdrop-filter:blur(10px);padding:0.25rem;border-radius:8px;border:1px solid var(--border)}
        .lang-btn{padding:0.3rem 0.6rem;background:transparent;color:var(--muted);border:none;border-radius:5px;cursor:pointer;font-size:0.72rem;font-weight:600;transition:all 0.2s}
        .lang-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
        .lang-btn.active{background:var(--accent);color:#fff}
        @media(min-width:769px){
            .container{max-width:420px;padding:32px 28px}
            .logo-img{height:56px}
            .logo-section h1{font-size:22px}
            .form-input{padding:13px 14px;font-size:15px}
            .form-label{font-size:15px}
            .btn{padding:13px 16px;font-size:15px}
        }
        .burgtv-back-btn{position:fixed;top:1rem;left:1rem;display:flex;align-items:center;justify-content:center;width:36px;height:36px;padding:0;background:rgba(20,20,30,0.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;text-decoration:none;z-index:1000;transition:all .2s}
        .burgtv-back-btn:hover{background:rgba(185,74,142,.15);border-color:#B94A8E;transform:translateX(-2px)}
        .burgtv-back-btn svg{width:16px;height:16px}
        @media(max-width:768px){.burgtv-back-btn{display:none!important}}
</style>

    <div class="container">

            <h1 id="stepTitle">Password dimenticata</h1>
            <p id="stepDesc">Inserisci la tua email per ricevere un codice di verifica.</p>
        </div>

        <div class="steps-indicator">
            <div class="step-dot active" id="dot1"></div>
            <div class="step-dot" id="dot2"></div>
            <div class="step-dot" id="dot3"></div>

        <div class="message error" id="errorMessage"><span id="errorText"></span></div>
        <div class="message success" id="successMessage"><span id="successText"></span></div>

        <!-- Step 1: Email -->
        <div class="step active" id="step1">
            <form onsubmit="sendOTP(event)">
                <div class="form-group">
                    <input type="email" id="email" class="form-input" placeholder=" " required autocomplete="email">
                    <label for="email" class="form-label" data-i18n="email">Email</label>
                </div>
                <div class="turnstile-wrapper">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAACI9QL47xbPexYyL" data-callback="onTurnstileSuccess" data-error-callback="onTurnstileError" data-expired-callback="onTurnstileExpired" data-retry="auto" data-theme="dark"></div>
                </div>
                <button type="submit" class="btn" id="btn1" data-i18n="sendCode">Invia codice</button>
            </form>
        </div>

        <!-- Step 2: OTP -->
        <div class="step" id="step2">
            <form onsubmit="verifyOTP(event)">
                <div class="form-group">
                    <input type="text" id="otp" class="form-input otp-input" placeholder=" " required maxlength="6" pattern="[0-9]{6}">
                    <label for="otp" class="form-label" data-i18n="otpLabel">Codice a 6 cifre</label>
                </div>
                <button type="submit" class="btn" id="btn2" data-i18n="verify">Verifica</button>
            </form>
            <div class="resend-link"><span data-i18n="resendQ">Non hai ricevuto il codice?</span> <a onclick="resendOTP()" data-i18n="resendLink">Invia di nuovo</a></div>
        </div>

        <!-- Step 3: New Password -->
        <div class="step" id="step3">
            <form onsubmit="resetPassword(event)">
                <div class="form-group">
                    <input type="password" id="newPassword" class="form-input" placeholder=" " required minlength="6">
                    <label for="newPassword" class="form-label" data-i18n="newPwd">Nuova password</label>
                </div>
                <div class="form-group">
                    <input type="password" id="confirmPassword" class="form-input" placeholder=" " required>
                    <label for="confirmPassword" class="form-label" data-i18n="confirmPwd">Conferma password</label>
                </div>
                <button type="submit" class="btn" id="btn3" data-i18n="savePwd">Salva password</button>
            </form>
        </div>

        <div class="back-login"><a href="login.html" data-i18n="backToLogin">Torna al login</a></div>
    </div>

    <script>

          nl: { back:'Terug', title:'Wachtwoord vergeten', desc1:'Vul uw e-mail in om een verificatiecode te ontvangen.', desc2:'We hebben een 6-cijferige code naar uw e-mail gestuurd.', desc3:'Kies een nieuw veilig wachtwoord.', title2:'Code invoeren', title3:'Nieuw wachtwoord', email:'E-mail', sendCode:'Code verzenden', otpLabel:'6-cijferige code', verify:'Verifiëren', resendQ:'Geen code ontvangen?', resendLink:'Opnieuw verzenden', newPwd:'Nieuw wachtwoord', confirmPwd:'Bevestig wachtwoord', savePwd:'Wachtwoord opslaan', backToLogin:'Terug naar inloggen' },
          pl: { back:'Wstecz', title:'Zapomniałeś hasła', desc1:'Wpisz swój e-mail aby otrzymać kod weryfikacyjny.', desc2:'Wysłaliśmy 6-cyfrowy kod na twój e-mail.', desc3:'Wybierz nowe bezpieczne hasło.', title2:'Wpisz kod', title3:'Nowe hasło', email:'E-mail', sendCode:'Wyślij kod', otpLabel:'Kod 6-cyfrowy', verify:'Zweryfikuj', resendQ:'Nie otrzymałeś kodu?', resendLink:'Wyślij ponownie', newPwd:'Nowe hasło', confirmPwd:'Potwierdź hasło', savePwd:'Zapisz hasło', backToLogin:'Powrót do logowania' },
          ru: { back:'Назад', title:'Забыли пароль', desc1:'Введите email чтобы получить код подтверждения.', desc2:'Мы отправили 6-значный код на ваш email.', desc3:'Выберите новый надёжный пароль.', title2:'Введите код', title3:'Новый пароль', email:'Email', sendCode:'Отправить код', otpLabel:'6-значный код', verify:'Подтвердить', resendQ:'Не получили код?', resendLink:'Отправить снова', newPwd:'Новый пароль', confirmPwd:'Подтвердите пароль', savePwd:'Сохранить пароль', backToLogin:'Вернуться к входу' },
          ar: { back:'رجوع', title:'نسيت كلمة المرور', desc1:'أدخل بريدك الإلكتروني لتلقي رمز التحقق.', desc2:'أرسلنا رمزاً مكوناً من 6 أرقام إلى بريدك.', desc3:'اختر كلمة مرور جديدة وآمنة.', title2:'أدخل الرمز', title3:'كلمة المرور الجديدة', email:'البريد الإلكتروني', sendCode:'إرسال الرمز', otpLabel:'رمز من 6 أرقام', verify:'تحقق', resendQ:'لم تستلم الرمز؟', resendLink:'إرسال مرة أخرى', newPwd:'كلمة المرور الجديدة', confirmPwd:'تأكيد كلمة المرور', savePwd:'حفظ كلمة المرور', backToLogin:'العودة إلى تسجيل الدخول' }
        };
        function _initFpLang(){
          const RE=/^(it|en|de|es|fr|pt|tr|nl|pl|ru|ar)$/;
          const m=document.cookie.match(/burgtv_lang=([^;]+)/);
          if(m && RE.test(m[1])) return m[1];
          const sv=localStorage.getItem('preferredLang')||localStorage.getItem('lang'); if(sv && RE.test(sv)) return sv;
          const nv=((navigator.languages&&navigator.languages[0])||navigator.language||'').slice(0,2).toLowerCase(); if(RE.test(nv)) return nv;
          return 'en';
        }
        let CURRENT_LANG = _initFpLang();
        function applyFpLang(l) {
          if(!FP_DICT[l])l='it';
          CURRENT_LANG = l;
          const d = FP_DICT[l] || FP_DICT.it;
          document.querySelectorAll('[data-i18n]').forEach(e => { const k = e.getAttribute('data-i18n'); if (d[k]) e.textContent = d[k]; });
          document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
          document.documentElement.lang = l; document.documentElement.dir = (l === "ar" ? "rtl" : "ltr");
          localStorage.setItem('preferredLang', l);
          localStorage.setItem('lang', l);
          const dom = location.hostname.endsWith('.burgtv.com')||location.hostname==='burgtv.com'?'; domain=.burgtv.com':'';
          document.cookie = 'burgtv_lang='+l+'; max-age=31536000; path=/'+dom+'; SameSite=Lax';
          document.title = d.title + ' - BurgTV';
          // refresh step text if currently shown
          if (typeof showStep === 'function' && currentStep) showStep(currentStep);
        }
        document.addEventListener('DOMContentLoaded', () => {
          document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyFpLang(b.dataset.lang)));
          applyFpLang(CURRENT_LANG);
        });

        const SUPABASE_URL = 'https://api.burgtv.com';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnc3BtcWZkdWFiZm1mc294cW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ1NTMyMDEsImV4cCI6MjA2MDEyOTIwMX0.1Xj4sa51Wi8U1Ebm4B3DE5JxCR3eTx2TQUxfV0TaA-I';

        let currentStep = 1;
        let userEmail = '';
        let resetToken = '';
        let turnstileToken = null;

        function onTurnstileSuccess(token) { turnstileToken = token; }
        function onTurnstileError() { turnstileToken = null; try{ turnstile.reset(); }catch(_){} }
        function onTurnstileExpired() { turnstileToken = null; }

        function showStep(step) {
            currentStep = step;
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');

            document.querySelectorAll('.step-dot').forEach((d, i) => {
                d.classList.remove('active', 'done');
                if (i + 1 < step) d.classList.add('done');
                if (i + 1 === step) d.classList.add('active');
            });

            const d = FP_DICT[CURRENT_LANG] || FP_DICT.it;
            const titles = [d.title, d.title2, d.title3];
            const descs = [d.desc1, d.desc2, d.desc3];
            document.getElementById('stepTitle').textContent = titles[step - 1];
            document.getElementById('stepDesc').textContent = descs[step - 1];
            hideMessages();
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMessage').classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successMessage').classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            const originalText = btn.dataset.text || btn.textContent;
            if (!btn.dataset.text) btn.dataset.text = originalText;
            btn.innerHTML = loading ? '<span class="spinner"></span>' : originalText;
        }

        async function sendOTP(e) {
            e.preventDefault();
            hideMessages();
            userEmail = document.getElementById('email').value.trim();

            setLoading('btn1', true);

            try {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    },
                    body: JSON.stringify({ email: userEmail, turnstile_token: turnstileToken })
                });

                const data = await res.json();

                if (data.success) {
                    showStep(2);
                } else {
                    showError(data.error || 'Errore nell\'invio del codice');
                }
            } catch (err) {
                showError('Errore di connessione');
            }

            setLoading('btn1', false);
        }

        async function resendOTP() {
            setLoading('btn2', true);
            try {
                await fetch(`${SUPABASE_URL}/functions/v1/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    },
                    body: JSON.stringify({ email: userEmail })
                });
                showSuccess('Codice inviato nuovamente!');
            } catch (err) {
                showError('Errore nell\'invio');
            }
            setLoading('btn2', false);
        }

        async function verifyOTP(e) {
            e.preventDefault();
            hideMessages();
            const otp = document.getElementById('otp').value.trim();

            if (otp.length !== 6) {
                showError('Il codice deve essere di 6 cifre');
                return;
            }

            setLoading('btn2', true);

            try {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/verify-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    },
                    body: JSON.stringify({ email: userEmail, otp })
                });

                const data = await res.json();

                if (data.success && data.reset_token) {
                    resetToken = data.reset_token;
                    showStep(3);
                } else {
                    showError(data.error || 'Codice non valido o scaduto');
                }
            } catch (err) {
                showError('Errore di connessione');
            }

            setLoading('btn2', false);
        }

        async function resetPassword(e) {
            e.preventDefault();
            hideMessages();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword.length < 6) {
                showError('La password deve avere almeno 6 caratteri');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('Le password non corrispondono');
                return;
            }

            setLoading('btn3', true);

            try {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    },
                    body: JSON.stringify({
                        email: userEmail,
                        reset_token: resetToken,
                        new_password: newPassword
                    })
                });

                const data = await res.json();

                if (data.success) {
                    showSuccess('Password aggiornata! Reindirizzamento...');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showError(data.error || 'Errore nel salvataggio');
                }
            } catch (err) {
                showError('Errore di connessione');
            }

            setLoading('btn3', false);
        }
    </script>
</body>
</html>
